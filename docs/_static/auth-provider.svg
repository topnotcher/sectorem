<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- RestClient -->
  <rect x="20" y="35" width="120" height="50" rx="5" fill="#374151" stroke="#4b5563"/>
  <text x="80" y="65" text-anchor="middle" fill="#f3f4f6" font-weight="600">RestClient</text>

  <!-- AuthProvider (interface) -->
  <rect x="195" y="35" width="130" height="50" rx="5" fill="#374151" stroke="#60a5fa" stroke-width="2"/>
  <text x="260" y="55" text-anchor="middle" fill="#d1d5db" font-size="11">interface</text>
  <text x="260" y="72" text-anchor="middle" fill="#f3f4f6" font-weight="600">AuthProvider</text>

  <!-- Authenticator / Your impl -->
  <rect x="380" y="10" width="90" height="36" rx="3" fill="none" stroke="#4b5563" stroke-dasharray="4,2"/>
  <text x="425" y="33" text-anchor="middle" fill="#9ca3af" font-size="11">Authenticator</text>

  <rect x="380" y="74" width="90" height="36" rx="3" fill="none" stroke="#4b5563" stroke-dasharray="4,2"/>
  <text x="425" y="97" text-anchor="middle" fill="#9ca3af" font-size="11">Your impl</text>

  <!-- Arrow: RestClient → AuthProvider -->
  <line x1="140" y1="60" x2="187" y2="60" stroke="#9ca3af" marker-end="url(#arrow)"/>

  <!-- Arrow: Authenticator → AuthProvider -->
  <line x1="380" y1="33" x2="333" y2="50" stroke="#9ca3af" marker-end="url(#arrow)"/>

  <!-- Arrow: Your impl → AuthProvider -->
  <line x1="380" y1="87" x2="333" y2="72" stroke="#9ca3af" marker-end="url(#arrow)"/>
</svg>
