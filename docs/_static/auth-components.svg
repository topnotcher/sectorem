<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Authenticator (center) -->
  <rect x="170" y="130" width="180" height="50" rx="5" fill="#374151" stroke="#60a5fa" stroke-width="2"/>
  <text x="260" y="160" text-anchor="middle" fill="#f3f4f6" font-weight="700" font-size="15">Authenticator</text>

  <!-- TokenStore (left) -->
  <rect x="20" y="20" width="150" height="50" rx="5" fill="#374151" stroke="#4b5563"/>
  <text x="95" y="42" text-anchor="middle" fill="#d1d5db" font-size="11">interface</text>
  <text x="95" y="58" text-anchor="middle" fill="#f3f4f6" font-weight="600">TokenStore</text>

  <!-- FileTokenStore (below TokenStore) -->
  <rect x="30" y="80" width="130" height="30" rx="3" fill="none" stroke="#4b5563" stroke-dasharray="4,2"/>
  <text x="95" y="100" text-anchor="middle" fill="#9ca3af" font-size="11">FileTokenStore</text>

  <!-- CallbackServer (right) -->
  <rect x="350" y="20" width="150" height="50" rx="5" fill="#374151" stroke="#4b5563"/>
  <text x="425" y="42" text-anchor="middle" fill="#d1d5db" font-size="11">interface</text>
  <text x="425" y="58" text-anchor="middle" fill="#f3f4f6" font-weight="600">CallbackServer</text>

  <!-- AiohttpCallbackServer (below CallbackServer) -->
  <rect x="350" y="80" width="150" height="30" rx="3" fill="none" stroke="#4b5563" stroke-dasharray="4,2"/>
  <text x="425" y="100" text-anchor="middle" fill="#9ca3af" font-size="11">localhost_server()</text>

  <!-- login_prompt (bottom) -->
  <rect x="185" y="240" width="150" height="44" rx="5" fill="#374151" stroke="#4b5563"/>
  <text x="260" y="258" text-anchor="middle" fill="#d1d5db" font-size="11">callback</text>
  <text x="260" y="274" text-anchor="middle" fill="#f3f4f6" font-weight="600">login_prompt(url)</text>

  <!-- Arrow: Authenticator → TokenStore -->
  <line x1="210" y1="130" x2="120" y2="75" stroke="#9ca3af" marker-end="url(#arrow)"/>

  <!-- Arrow: Authenticator → CallbackServer (start/stop) -->
  <line x1="318" y1="130" x2="408" y2="75" stroke="#9ca3af" marker-end="url(#arrow)"/>
  <!-- Arrow: CallbackServer → Authenticator (auth code) -->
  <line x1="392" y1="75" x2="302" y2="130" stroke="#9ca3af" marker-end="url(#arrow)"/>

  <!-- Arrow: Authenticator → login_prompt -->
  <line x1="260" y1="180" x2="260" y2="232" stroke="#9ca3af" marker-end="url(#arrow)"/>

  <!-- Labels on arrows -->
  <text x="148" y="112" text-anchor="middle" fill="#6b7280" font-size="10">persist tokens</text>
  <text x="390" y="112" text-anchor="middle" fill="#6b7280" font-size="10">start/stop</text>
  <text x="332" y="92" text-anchor="middle" fill="#6b7280" font-size="10">auth code</text>
  <text x="300" y="212" text-anchor="middle" fill="#6b7280" font-size="10">prompt user</text>
</svg>
